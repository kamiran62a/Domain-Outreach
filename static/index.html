<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Outreach</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0E0F11;--surface:#16181C;--border:#2A2D35;--accent:#4F8EF7;--accent2:#7C3AED;--text:#F0F2F7;--muted:#6B7280;--green:#10B981}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px}
h1{font-size:22px;font-weight:600;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px;text-align:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:560px;margin-bottom:14px}
.field{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
select option{background:var(--surface)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.langs{display:flex;gap:8px}
.lb{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s}
.lb.on{border-color:var(--accent);color:var(--accent);background:#1a2540}
.btn{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.res{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:560px;display:none}
.res.show{display:block}
.rl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.subj{font-size:13px;color:var(--accent);background:#1C2033;padding:10px 13px;border-radius:8px;margin-bottom:14px}
.body{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.75;white-space:pre-wrap;margin-bottom:16px}
.acts{display:flex;gap:10px;margin-bottom:12px}
.ab{flex:1;padding:11px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;cursor:pointer;transition:all .2s}
.ab.go{background:var(--green);border-color:var(--green);color:#fff}
.ab:disabled{opacity:.4;cursor:not-allowed}
.ok{display:none;text-align:center;padding:11px;background:#0d2b1f;border:1px solid var(--green);border-radius:10px;color:var(--green);font-size:14px;margin-bottom:12px}
.er{display:none;text-align:center;padding:11px;background:#2b0d0d;border:1px solid #ef4444;border-radius:10px;color:#ef4444;font-size:13px;margin-bottom:12px}
.tip{font-size:12px;color:var(--muted);text-align:center}
.sp{width:15px;height:15px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<h1>إرسال إيميل البيع ✦</h1>
<div class="card">
  <div class="row">
    <div class="field"><label>اسم المستلم</label><input id="f-name" placeholder="Dani, Marco..."></div>
    <div class="field"><label>إيميل المستلم</label><input id="f-email" type="email" placeholder="owner@cafe.com"></div>
  </div>
  <div class="row">
    <div class="field"><label>اسم الدومين</label><input id="f-domain" placeholder="tirol.cafe"></div>
    <div class="field"><label>نوع النشاط</label>
      <select id="f-type">
        <option value="cafe">Café / Coffee shop</option>
        <option value="restaurant">Restaurant</option>
        <option value="taxi">Taxi company</option>
        <option value="auto">Auto / Car services</option>
        <option value="startup">Startup / Tech</option>
        <option value="fintech">Fintech / Payments</option>
        <option value="general">General</option>
      </select>
    </div>
  </div>
  <div class="field"><label>لغة الإيميل</label>
    <div class="langs">
      <button class="lb on" onclick="setLang('de',this)">🇩🇪 Deutsch</button>
      <button class="lb" onclick="setLang('en',this)">🇬🇧 English</button>
      <button class="lb" onclick="setLang('ar',this)">🇸🇦 العربية</button>
    </div>
  </div>
  <button class="btn" id="genBtn" onclick="generate()">✦ اكتب الإيميل</button>
</div>
<div class="res" id="resCard">
  <div class="rl">SUBJECT</div>
  <div class="subj" id="r-subj"></div>
  <div class="rl">BODY</div>
  <div class="body" id="r-body"></div>
  <div class="ok" id="ok">✓ تم الإرسال بنجاح من kamiran@kamiran.me</div>
  <div class="er" id="er"></div>
  <div class="acts">
    <button class="ab" onclick="copyAll()">📋 نسخ</button>
    <button class="ab go" id="sendBtn" onclick="sendNow()">📨 إرسال الآن</button>
  </div>
  <p class="tip">⚡ يُرسل مباشرة من kamiran@kamiran.me</p>
</div>
<script>
var lang='de';
function setLang(l,btn){lang=l;document.querySelectorAll('.lb').forEach(function(b){b.classList.remove('on')});btn.classList.add('on')}
function val(id){return document.getElementById(id).value.trim()}
function el(id){return document.getElementById(id)}
async function generate(){
  var domain=val('f-domain');
  if(!domain){alert('أدخل اسم الدومين');return}
  var btn=el('genBtn');
  btn.disabled=true;btn.innerHTML='<span class="sp"></span>جاري الكتابة...';
  el('ok').style.display='none';el('er').style.display='none';
  try{
    var r=await fetch('/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({recipient:val('f-name'),domain:domain,btype:val('f-type'),lang:lang})});
    var data=await r.json();
    el('r-subj').textContent=data.subject;
    el('r-body').textContent=data.body;
    el('resCard').classList.add('show');
  }catch(e){alert('خطأ — حاول مرة ثانية')}
  btn.disabled=false;btn.innerHTML='✦ اكتب الإيميل';
}
async function sendNow(){
  var email=val('f-email');
  var subject=el('r-subj').textContent;
  var body=el('r-body').textContent;
  if(!email){alert('أدخل إيميل المستلم');return}
  if(!subject){alert('اضغط اكتب الإيميل أولاً');return}
  var btn=el('sendBtn');
  btn.disabled=true;btn.innerHTML='<span class="sp"></span>جاري الإرسال...';
  el('ok').style.display='none';el('er').style.display='none';
  try{
    var r=await fetch('/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to_email:email,subject:subject,body:body})});
    var data=await r.json();
    if(data.success){el('ok').style.display='block'}
    else{el('er').textContent='خطأ: '+data.error;el('er').style.display='block'}
  }catch(e){el('er').textContent='خطأ في الاتصال';el('er').style.display='block'}
  btn.disabled=false;btn.innerHTML='📨 إرسال الآن';
}
function copyAll(){
  navigator.clipboard.writeText('Subject: '+el('r-subj').textContent+'\n\n'+el('r-body').textContent);
  var b=event.target;b.textContent='✓ تم النسخ';setTimeout(function(){b.textContent='📋 نسخ'},2000);
}
</script>
</body>
</html>
